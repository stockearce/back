{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Cliente</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="mb-4">Editar Cliente</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Nombre Completo</label>
            <input type="text" name="nombre_completo"
                   class="form-control"
                   value="{{ cliente.nombre_completo }}"
                   required>
        </div>

        <div class="mb-3">
            <label class="form-label">Nombre del Local</label>
            <input type="text" name="nombre_local"
                   class="form-control"
                   value="{{ cliente.nombre_local }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email"
                   class="form-control"
                   value="{{ cliente.email }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" name="telefono"
                   class="form-control"
                   value="{{ cliente.telefono }}">
        </div>

        <div class="mb-3">
            <label class="form-label">Dirección</label>
            <textarea name="direccion"
                      class="form-control">{{ cliente.direccion }}</textarea>
        </div>

        {% if vendedores %}
        <div class="mb-3">
            <label class="form-label">Vendedor Asignado</label>
            <select name="usuario" class="form-select">
                {% for vendedor in vendedores %}
                    <option value="{{ vendedor.id }}"
                        {% if vendedor == cliente.usuario %}selected{% endif %}>
                        {{ vendedor.username }}
                    </option>
                {% endfor %}
            </select>
        </div>
        {% endif %}

        <div class="mt-4">
            <a href="{% url 'lista_clientes' %}" class="btn btn-secondary">
                Volver
            </a>
            <button type="submit" class="btn btn-primary">
                Guardar Cambios
            </button>
        </div>

    </form>

</div>

</body>
</html>
