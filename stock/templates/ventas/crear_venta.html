{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Venta - STOCKEARCE</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --amarillo: #F5C518;
            --amarillo-claro: #fffbea;
            --amarillo-suave: rgba(245,197,24,0.12);
            --gris-oscuro: #2c2c2c;
            --gris-medio: #666;
            --gris-claro: #f5f5f5;
            --exito: #10b981;
            --peligro: #ef4444;
            --sombra-sm: 0 4px 15px rgba(0,0,0,0.05);
            --sombra-md: 0 6px 28px rgba(0,0,0,0.10);
            --sombra-lg: 0 12px 35px rgba(0,0,0,0.15);
            --transicion: all 0.2s ease-in-out;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Barlow', sans-serif;
            background: #e8e8e8;
            color: var(--gris-oscuro);
            min-height: 100vh;
            padding-bottom: 60px;
            -webkit-font-smoothing: antialiased;
        }
        .container { max-width:960px; margin:0 auto; padding:20px; }

        .navbar-custom {
            background:white; padding:15px 25px; border-radius:15px;
            box-shadow:var(--sombra-md); margin-bottom:30px;
            display:flex; justify-content:space-between; align-items:center;
            border-bottom:4px solid var(--amarillo);
        }
        .logo-wrapper { display:flex; align-items:center; gap:14px; }
        .logo-carrito {
            width:52px; height:52px; background:var(--amarillo);
            border-radius:12px; display:flex; align-items:center;
            justify-content:center; font-size:28px;
        }
        .logo-texto .nombre {
            font-family:'Barlow Condensed',sans-serif; font-weight:800;
            font-size:28px; line-height:1; color:var(--gris-oscuro);
        }
        .logo-texto .nombre span { color:var(--amarillo); }
        .logo-texto .sub { font-size:10px; letter-spacing:2px; color:var(--gris-medio); text-transform:uppercase; }
        .btn-salir {
            border:2px solid var(--peligro); color:var(--peligro);
            font-weight:700; border-radius:10px; padding:8px 20px;
            text-decoration:none; font-size:14px; background:transparent;
            transition:var(--transicion);
        }
        .btn-salir:hover { background:var(--peligro); color:white; }

        .card-venta { background:white; border-radius:18px; box-shadow:var(--sombra-md); overflow:hidden; margin-bottom:20px; }
        .card-header-amarce {
            background:var(--gris-oscuro); padding:22px 30px;
            display:flex; align-items:center; gap:15px;
            border-bottom:4px solid var(--amarillo);
        }
        .card-header-amarce h3 {
            font-family:'Barlow Condensed',sans-serif; font-weight:800;
            font-size:24px; color:white; margin:0; text-transform:uppercase;
        }
        .icono-header { font-size:28px; }
        .card-body { padding:30px; }

        .form-label {
            display:block; font-weight:700; font-size:12px;
            margin-bottom:8px; color:var(--gris-oscuro);
            text-transform:uppercase; letter-spacing:1px;
        }
        .text-danger { color:var(--peligro); }
        .mb-4 { margin-bottom:24px; }
        .mb-3 { margin-bottom:16px; }

        .autocomplete-wrapper { position:relative; }
        .autocomplete-input {
            width:100%; padding:14px 46px;
            font-size:15px; font-family:'Barlow',sans-serif;
            color:var(--gris-oscuro); background:white;
            border:2px solid #e0e0e0; border-radius:12px;
            transition:var(--transicion);
        }
        .autocomplete-input:focus {
            outline:none; border-color:var(--amarillo);
            box-shadow:0 0 0 4px rgba(245,197,24,0.15);
        }
        .autocomplete-input.valido   { border-color:var(--exito); background:#f0fdf4; }
        .autocomplete-input.invalido { border-color:var(--peligro); background:#fef2f2; }
        .ac-icon {
            position:absolute; left:15px; top:50%;
            transform:translateY(-50%); font-size:18px; pointer-events:none; z-index:2;
        }
        .ac-check {
            position:absolute; right:14px; top:50%;
            transform:translateY(-50%); font-size:16px;
            font-weight:800; color:var(--exito); display:none; z-index:2;
        }
        .autocomplete-input.valido ~ .ac-check { display:block; }
        .autocomplete-dropdown {
            position:absolute; top:calc(100% + 6px); left:0; right:0;
            background:white; border:2px solid var(--amarillo);
            border-radius:12px; box-shadow:var(--sombra-lg);
            z-index:9999; max-height:280px; overflow-y:auto; display:none;
        }
        .autocomplete-dropdown.show { display:block; }
        .ac-item {
            padding:12px 16px; cursor:pointer;
            border-bottom:1px solid var(--gris-claro);
            transition:background 0.15s;
        }
        .ac-item:last-child { border-bottom:none; }
        .ac-item:hover, .ac-item.activo { background:var(--amarillo-claro); }
        .ac-nombre { font-weight:700; font-size:15px; }
        .ac-detalle { font-size:12px; color:var(--gris-medio); margin-top:2px; }
        .ac-badges { display:flex; gap:8px; flex-wrap:wrap; margin-top:5px; }
        .ac-badge {
            display:inline-flex; align-items:center; gap:4px;
            background:var(--amarillo-suave); padding:3px 10px;
            border-radius:6px; font-size:11px; font-weight:700;
        }
        .ac-badge.sin-stock { background:#fef2f2; color:var(--peligro); }
        .ac-loading, .ac-empty { padding:18px; text-align:center; color:var(--gris-medio); font-size:14px; }
        .highlight { background:var(--amarillo); border-radius:3px; padding:0 2px; }

        .campo-error {
            font-size:12px; font-weight:600; color:var(--peligro);
            margin-top:7px; display:none; align-items:center; gap:5px;
        }
        .campo-error.show { display:flex; }
        .campo-error::before { content:"⚠️"; }

        .productos-section {
            background:var(--gris-claro); border-radius:15px; padding:20px;
        }
        .producto-item {
            background:white; border-radius:14px; padding:20px;
            margin-bottom:15px; box-shadow:var(--sombra-sm);
            border:2px solid transparent; transition:var(--transicion);
        }
        .producto-item:hover { border-color:rgba(245,197,24,0.3); }

        .prod-grid-top {
            display:grid; grid-template-columns:1fr 44px;
            gap:12px; align-items:start; margin-bottom:14px;
        }
        .prod-grid-bottom {
            display:grid; grid-template-columns:1fr 140px;
            gap:12px; align-items:start;
        }

        .form-control {
            width:100%; padding:12px 16px; font-size:14px;
            font-family:'Barlow',sans-serif; color:var(--gris-oscuro);
            background:white; border:2px solid #e0e0e0;
            border-radius:10px; transition:var(--transicion);
        }
        .form-control:focus {
            outline:none; border-color:var(--amarillo);
            box-shadow:0 0 0 3px rgba(245,197,24,0.15);
        }

        .pres-select {
            background:white; border:2px solid var(--amarillo);
            border-radius:10px; padding:12px 16px;
            font-size:14px; font-family:'Barlow',sans-serif;
            font-weight:600; color:var(--gris-oscuro);
            width:100%; cursor:pointer; transition:var(--transicion);
        }
        .pres-select:focus { outline:none; box-shadow:0 0 0 3px rgba(245,197,24,0.2); }
        .pres-select.error { border-color:var(--peligro); background:#fef2f2; }

        .pres-wrapper { width:100%; }
        .pres-label, .cant-label {
            font-size:11px; font-weight:700; text-transform:uppercase;
            letter-spacing:1px; color:var(--gris-medio); margin-bottom:6px; display:block;
        }
        .cant-wrapper { width:100%; }
        .cant-input { text-align:center; font-weight:700; font-size:16px; }
        .cant-input.advertencia { border-color:#f59e0b; background:#fffbeb; }
        .cant-input.success     { border-color:var(--exito); background:#f0fdf4; }

        .stock-msg {
            font-size:11px; font-weight:600; margin-top:5px;
            display:none; align-items:center; gap:4px;
        }
        .stock-msg.ok          { display:flex; color:var(--exito); }
        .stock-msg.advertencia { display:flex; color:#f59e0b; }

        .btn-remove {
            width:44px; height:44px; border-radius:10px;
            border:2px solid #e0e0e0; background:transparent;
            color:var(--gris-medio); font-size:16px; cursor:pointer;
            transition:var(--transicion); display:flex;
            align-items:center; justify-content:center;
        }
        .btn-remove:hover:not(:disabled) { background:var(--peligro); color:white; border-color:var(--peligro); }
        .btn-remove:disabled { opacity:0.25; cursor:not-allowed; }

        .btn-agregar {
            width:100%; padding:14px; background:transparent;
            border:2px dashed #ccc; color:var(--gris-medio);
            border-radius:12px; font-weight:700; font-size:13px;
            cursor:pointer; transition:var(--transicion);
            text-transform:uppercase; letter-spacing:0.5px; margin-top:5px;
        }
        .btn-agregar:hover { border-color:var(--amarillo); color:var(--gris-oscuro); background:var(--amarillo-claro); }

        textarea.form-control { min-height:90px; resize:vertical; padding:14px 16px; }

        .precio-badge {
            display:inline-block; background:var(--amarillo);
            color:var(--gris-oscuro); font-weight:800; font-size:13px;
            padding:4px 12px; border-radius:20px; margin-top:6px;
        }

        .acciones-finales { display:grid; gap:12px; margin-top:28px; }
        .btn-principal {
            background:var(--gris-oscuro); color:var(--amarillo);
            border:none; padding:18px; border-radius:14px;
            font-family:'Barlow Condensed',sans-serif; font-weight:800;
            font-size:18px; text-transform:uppercase; letter-spacing:1px;
            cursor:pointer; transition:var(--transicion);
            box-shadow:0 4px 15px rgba(0,0,0,0.2);
            display:flex; align-items:center; justify-content:center; gap:10px;
        }
        .btn-principal:hover:not(:disabled) {
            background:var(--amarillo); color:var(--gris-oscuro);
            transform:translateY(-2px); box-shadow:var(--sombra-lg);
        }
        .btn-principal:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
        .btn-secundario {
            background:white; color:var(--gris-medio);
            border:2px solid #e0e0e0; padding:14px;
            border-radius:14px; font-weight:700; font-size:14px;
            text-align:center; text-decoration:none;
            transition:var(--transicion); display:block;
        }
        .btn-secundario:hover { border-color:var(--gris-medio); color:var(--gris-oscuro); }

        @media(max-width:768px) {
            .container { padding:12px; }
            .navbar-custom { flex-direction:column; gap:12px; }
            .card-body { padding:18px; }
            .prod-grid-bottom { grid-template-columns:1fr; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="navbar-custom">
        <div class="logo-wrapper">
            <div class="logo-carrito">🛒</div>
            <div class="logo-texto">
                <div class="nombre">STOCKE<span>ARCE</span></div>
                <div class="sub">Sistema de Gestión</div>
            </div>
        </div>
        <a href="{% url 'lista_ventas' %}" class="btn-salir">✕ Cancelar</a>
    </div>

    <div class="card-venta">
        <div class="card-header-amarce">
            <span class="icono-header">📝</span>
            <h3>Nueva Venta / Pedido</h3>
        </div>

        <div class="card-body">
            <form method="POST" id="form-venta" novalidate>
                {% csrf_token %}

                <div class="mb-4">
                    <label class="form-label">Cliente <span class="text-danger">*</span></label>
                    <input type="hidden" name="cliente" id="cliente-id">
                    <div class="autocomplete-wrapper">
                        <span class="ac-icon">👤</span>
                        <input type="text" id="cliente-input"
                               class="autocomplete-input"
                               placeholder="Escribí el nombre del cliente..."
                               autocomplete="off">
                        <span class="ac-check">✓</span>
                        <div class="autocomplete-dropdown" id="cliente-dropdown"></div>
                    </div>
                    <div class="campo-error" id="cliente-error">Seleccioná un cliente de la lista</div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Productos <span class="text-danger">*</span></label>
                    <div class="productos-section">
                        <div id="productos-container">
                            <div class="producto-item">
                                <input type="hidden" name="productos" class="prod-id">
                                <input type="hidden" name="presentaciones" class="pres-id">
                                <div class="prod-grid-top">
                                    <div>
                                        <div class="autocomplete-wrapper">
                                            <span class="ac-icon">📦</span>
                                            <input type="text" class="autocomplete-input prod-input"
                                                   placeholder="Buscá un producto..." autocomplete="off">
                                            <span class="ac-check">✓</span>
                                            <div class="autocomplete-dropdown prod-dropdown"></div>
                                        </div>
                                        <div class="campo-error prod-error">Seleccioná un producto de la lista</div>
                                    </div>
                                    <button type="button" class="btn-remove remove-prod" disabled>✕</button>
                                </div>
                                <div class="prod-grid-bottom">
                                    <div class="pres-wrapper" style="display:none;">
                                        <span class="pres-label">📦 Presentación</span>
                                        <select class="pres-select">
                                            <option value="">-- Seleccioná presentación --</option>
                                        </select>
                                        <div class="precio-badge" style="display:none;"></div>
                                    </div>
                                    <div class="cant-wrapper">
                                        <span class="cant-label">Cantidad</span>
                                        <input type="number" name="cantidades"
                                               class="form-control cant-input"
                                               placeholder="0" min="1">
                                        <div class="stock-msg"></div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="button" class="btn-agregar" id="btn-agregar">
                            + Agregar otro producto
                        </button>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Notas / Observaciones</label>
                    <textarea name="notas" class="form-control"
                              placeholder="Información adicional..."></textarea>
                </div>

                <div class="acciones-finales">
                    <button type="submit" class="btn-principal" id="btn-crear" disabled>
                        <span>🔒</span> Completá cliente y producto
                    </button>
                    <a href="{% url 'lista_ventas' %}" class="btn-secundario">← Volver al listado</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
function actualizarBoton() {
    const btn = document.getElementById('btn-crear');
    const clienteOk = acCliente.esValido();

    const prodItems = document.querySelectorAll('.producto-item');
    let hayProdOk = false;

    prodItems.forEach(item => {
        const hidden  = item.querySelector('.prod-id');
        const cantEl  = item.querySelector('.cant-input');
        const cant    = parseInt(cantEl.value) || 0;
        const prodSel = !!hidden.value;
        const cantOk  = cant >= 1;

        // ✅ Ya no bloquea por stock
        if (prodSel && cantOk) hayProdOk = true;
    });

    const todo = clienteOk && hayProdOk;
    btn.disabled = !todo;
    btn.innerHTML = todo
        ? '<span>💾</span> Crear Venta'
        : '<span>🔒</span> Completá cliente y producto';
}

const _clienteHiddenEl = document.getElementById('cliente-id');
const _clienteObs = new MutationObserver(actualizarBoton);
_clienteObs.observe(_clienteHiddenEl, { attributes: true });
document.getElementById('cliente-input').addEventListener('input', actualizarBoton);

function resaltar(texto, q) {
    if (!q) return texto;
    const esc = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return texto.replace(new RegExp(`(${esc})`, 'gi'), '<span class="highlight">$1</span>');
}

const timers = new WeakMap();
function debounce(fn, el, ms = 260) {
    clearTimeout(timers.get(el));
    timers.set(el, setTimeout(fn, ms));
}

function crearAC({ inputEl, dropdownEl, hiddenEl, url, renderItem, onSelect }) {
    let items = [];
    let idx = -1;
    let esValido = false;

    function setValido(v) {
        esValido = v;
        inputEl.classList.toggle('valido',   v);
        inputEl.classList.toggle('invalido', !v && !!inputEl.value.trim());
        if (!v && hiddenEl) hiddenEl.value = '';
    }

    function mostrar(lista) {
        items = lista; idx = -1;
        dropdownEl.innerHTML = lista.length
            ? lista.map((it, i) =>
                `<div class="ac-item" data-i="${i}">${renderItem(it, inputEl.value.trim())}</div>`
              ).join('')
            : '<div class="ac-empty">🔍 Sin resultados</div>';
        dropdownEl.classList.add('show');
    }

    function cerrar() { dropdownEl.classList.remove('show'); idx = -1; }

    function elegir(item) {
        inputEl.value = item.nombre;
        if (hiddenEl) hiddenEl.value = item.id;
        setValido(true);
        ocultarError();
        if (onSelect) onSelect(item);
        cerrar();
    }

    function mover(dir) {
        const els = dropdownEl.querySelectorAll('.ac-item');
        if (!els.length) return;
        els[idx]?.classList.remove('activo');
        idx = (idx + dir + els.length) % els.length;
        els[idx]?.classList.add('activo');
        els[idx]?.scrollIntoView({ block: 'nearest' });
    }

    function ocultarError() {
        const err = inputEl.closest('.autocomplete-wrapper')
                            ?.parentElement?.querySelector('.campo-error');
        err?.classList.remove('show');
    }

    inputEl.addEventListener('input', () => {
        const q = inputEl.value.trim();
        setValido(false);
        if (!q) { cerrar(); return; }
        dropdownEl.innerHTML = '<div class="ac-loading">⏳ Buscando...</div>';
        dropdownEl.classList.add('show');
        debounce(async () => {
            try {
                const r = await fetch(`${url}?q=${encodeURIComponent(q)}`);
                const d = await r.json();
                mostrar(d.resultados || []);
            } catch {
                dropdownEl.innerHTML = '<div class="ac-empty">Error de conexión</div>';
            }
        }, inputEl);
    });

    inputEl.addEventListener('keydown', e => {
        if (!dropdownEl.classList.contains('show')) return;
        if (e.key === 'ArrowDown') { e.preventDefault(); mover(1); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); mover(-1); }
        else if (e.key === 'Enter') { e.preventDefault(); if (idx >= 0 && items[idx]) elegir(items[idx]); }
        else if (e.key === 'Escape') cerrar();
    });

    dropdownEl.addEventListener('mousedown', e => {
        const el = e.target.closest('.ac-item');
        if (!el) return;
        e.preventDefault();
        elegir(items[parseInt(el.dataset.i)]);
    });

    document.addEventListener('click', e => {
        if (!inputEl.contains(e.target) && !dropdownEl.contains(e.target)) {
            cerrar();
            if (inputEl.value.trim() && !esValido) setValido(false);
        }
    });

    return {
        esValido: () => esValido,
        mostrarError: () => {
            setValido(false);
            const err = inputEl.closest('.autocomplete-wrapper')
                                ?.parentElement?.querySelector('.campo-error');
            err?.classList.add('show');
            inputEl.focus();
        }
    };
}

const acCliente = crearAC({
    inputEl:    document.getElementById('cliente-input'),
    dropdownEl: document.getElementById('cliente-dropdown'),
    hiddenEl:   document.getElementById('cliente-id'),
    url: '{% url "buscar_clientes" %}',
    renderItem: (it, q) => `
        <div class="ac-nombre">${resaltar(it.nombre, q)}</div>
        ${it.detalle ? `<div class="ac-detalle">📞 ${it.detalle}</div>` : ''}
    `,
    onSelect: () => actualizarBoton()
});

function cargarPresentaciones(prodItem, presentaciones, stockTotal) {
    const presWrapper = prodItem.querySelector('.pres-wrapper');
    const presSelect  = prodItem.querySelector('.pres-select');
    const presHidden  = prodItem.querySelector('.pres-id');
    const cantEl      = prodItem.querySelector('.cant-input');
    const precioBadge = prodItem.querySelector('.precio-badge');

    presSelect.innerHTML = '<option value="">-- Seleccioná presentación --</option>';

    if (!presentaciones || presentaciones.length === 0) {
        presWrapper.style.display = 'none';
        presHidden.value = '';
        cantEl.dataset.stock = stockTotal;
        return;
    }

    presentaciones.forEach(p => {
        const opt = document.createElement('option');
        opt.value            = p.id;
        opt.textContent      = `${p.nombre} (x${p.cantidad_unidades})`;
        opt.dataset.precio   = p.precio;
        opt.dataset.unidades = p.cantidad_unidades;
        presSelect.appendChild(opt);
    });

    presWrapper.style.display = 'block';

    presSelect.onchange = () => {
        const opt = presSelect.options[presSelect.selectedIndex];
        presHidden.value = presSelect.value;

        if (presSelect.value) {
            const uniPorPres     = parseInt(opt.dataset.unidades || 1);
            cantEl.dataset.stock = Math.floor(stockTotal / uniPorPres);
            precioBadge.textContent  = `💲 $${Number(opt.dataset.precio).toLocaleString('es-AR')}`;
            precioBadge.style.display = 'inline-block';
        } else {
            cantEl.dataset.stock      = stockTotal;
            presHidden.value          = '';
            precioBadge.style.display = 'none';
        }
        validarCant(prodItem);
        actualizarBoton();
    };
}

function iniciarProd(item) {
    const inputEl    = item.querySelector('.prod-input');
    const dropdownEl = item.querySelector('.prod-dropdown');
    const hiddenEl   = item.querySelector('.prod-id');
    const cantEl     = item.querySelector('.cant-input');

    if (inputEl._ok) return;
    inputEl._ok = true;

    const ac = crearAC({
        inputEl, dropdownEl, hiddenEl,
        url: '{% url "buscar_productos" %}',
        renderItem: (it, q) => `
            <div class="ac-nombre">${resaltar(it.nombre, q)}</div>
            <div class="ac-badges">
                ${it.presentaciones && it.presentaciones.length
                    ? it.presentaciones.map(p =>
                        `<span class="ac-badge">📦 ${p.nombre} — $${Number(p.precio).toLocaleString('es-AR')}</span>`
                      ).join('')
                    : `<span class="ac-badge ${it.stock === 0 ? 'sin-stock' : ''}">
                           ${it.stock === 0 ? '❌ Sin stock' : '📦 Stock: ' + it.stock}
                       </span>`
                }
            </div>
        `,
        onSelect: it => {
            cargarPresentaciones(item, it.presentaciones || [], it.stock);
            validarCant(item);
            actualizarBoton();
        }
    });

    item._ac = ac;
    cantEl.addEventListener('input', () => { validarCant(item); actualizarBoton(); });
}

function validarCant(prodItem) {
    const cantEl  = prodItem.querySelector('.cant-input');
    const stockEl = prodItem.querySelector('.stock-msg');
    const stock   = parseInt(cantEl.dataset.stock ?? -1);
    const cant    = parseInt(cantEl.value) || 0;

    stockEl.className = 'stock-msg';
    cantEl.classList.remove('advertencia', 'success');

    if (stock < 0 || !cant) return;

    if (cant > stock && stock >= 0) {
        // ✅ Solo avisa, no bloquea
        cantEl.classList.add('advertencia');
        stockEl.textContent = `⚠️ Stock insuficiente (hay ${stock}), se creará igual`;
        stockEl.classList.add('advertencia');
    } else {
        cantEl.classList.add('success');
        stockEl.textContent = `✓ ${stock} disponibles`;
        stockEl.classList.add('ok');
    }
}

iniciarProd(document.querySelector('.producto-item'));

document.getElementById('btn-agregar').addEventListener('click', () => {
    const cont  = document.getElementById('productos-container');
    const nuevo = document.createElement('div');
    nuevo.className = 'producto-item';
    nuevo.innerHTML = `
        <input type="hidden" name="productos" class="prod-id">
        <input type="hidden" name="presentaciones" class="pres-id">
        <div class="prod-grid-top">
            <div>
                <div class="autocomplete-wrapper">
                    <span class="ac-icon">📦</span>
                    <input type="text" class="autocomplete-input prod-input"
                           placeholder="Buscá un producto..." autocomplete="off">
                    <span class="ac-check">✓</span>
                    <div class="autocomplete-dropdown prod-dropdown"></div>
                </div>
                <div class="campo-error prod-error">Seleccioná un producto de la lista</div>
            </div>
            <button type="button" class="btn-remove remove-prod">✕</button>
        </div>
        <div class="prod-grid-bottom">
            <div class="pres-wrapper" style="display:none;">
                <span class="pres-label">📦 Presentación</span>
                <select class="pres-select">
                    <option value="">-- Seleccioná presentación --</option>
                </select>
                <div class="precio-badge" style="display:none;"></div>
            </div>
            <div class="cant-wrapper">
                <span class="cant-label">Cantidad</span>
                <input type="number" name="cantidades" class="form-control cant-input"
                       placeholder="0" min="1">
                <div class="stock-msg"></div>
            </div>
        </div>
    `;
    cont.appendChild(nuevo);
    nuevo.style.cssText = 'opacity:0;transform:translateY(-8px)';
    requestAnimationFrame(() => {
        nuevo.style.transition = 'all 0.25s ease';
        nuevo.style.opacity = '1';
        nuevo.style.transform = 'translateY(0)';
    });
    iniciarProd(nuevo);
});

document.getElementById('productos-container').addEventListener('click', e => {
    if (!e.target.classList.contains('remove-prod')) return;
    const item = e.target.closest('.producto-item');
    item.style.cssText = 'opacity:0;transform:translateX(15px);transition:all 0.2s ease';
    setTimeout(() => { item.remove(); actualizarBoton(); }, 200);
});

document.getElementById('form-venta').addEventListener('submit', e => {
    let ok = true;

    if (!acCliente.esValido()) {
        acCliente.mostrarError();
        ok = false;
    }

    const prodItems = document.querySelectorAll('.producto-item');
    let hayUno = false;

    prodItems.forEach(item => {
        const ac     = item._ac;
        const hidden = item.querySelector('.prod-id');
        const cantEl = item.querySelector('.cant-input');
        const presEl = item.querySelector('.pres-select');
        const cant   = parseInt(cantEl.value) || 0;

        if (hidden.value && presEl && presEl.options.length > 1 && !presEl.value) {
            presEl.classList.add('error');
            ok = false;
        }

        if (!hidden.value) {
            if (ac) ac.mostrarError();
            ok = false;
        } else {
            hayUno = true;
            if (!cant) {
                cantEl.classList.add('advertencia');
                ok = false;
            }
            // ✅ No valida stock al enviar
        }
    });

    if (!hayUno) ok = false;

    if (!ok) {
        e.preventDefault();
        const primer = document.querySelector(
            '.autocomplete-input.invalido, .campo-error.show, .cant-input.advertencia, .pres-select.error'
        );
        primer?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
});
</script>
</body>
