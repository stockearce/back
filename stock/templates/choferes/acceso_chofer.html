{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>STOCKEARCE - Selección de Usuario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">

    <style>
        :root {
            --dorado-arce: #ffbf00;
            --negro-profundo: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --radius: 18px;
        }

        body {
            background: var(--negro-profundo);
            background: radial-gradient(circle at top, #1a1a1a 0%, #050505 100%);
            color: #ffffff;
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* HEADER OPTIMIZADO */
        .header-section {
            padding: 40px 20px 20px;
            text-align: center;
        }

        .main-title {
            font-weight: 900;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: -1px;
            font-size: 2.2rem;
            margin: 0;
        }

        /* GRID RESPONSIVO REAL */
        .chofer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .chofer-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--radius);
            padding: 20px 10px;
            text-align: center;
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .chofer-card:active {
            transform: scale(0.95);
            background: rgba(255, 191, 0, 0.1);
        }

        .chofer-avatar {
            width: 56px;
            height: 56px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px;
            font-size: 24px;
            color: var(--dorado-arce);
        }

        .chofer-nombre {
            font-size: 0.85rem;
            font-weight: 600;
            color: #efefef;
        }

        /* MODAL PIN REINVENTADO */
        .pin-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(20px);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* En desktop centrado */
            z-index: 2000;
        }

        .pin-box {
            width: 90%;
            max-width: 400px;
            padding: 30px;
            text-align: center;
        }

        /* Inputs de PIN Estilo App Moderno */
        .pin-inputs-container {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin: 30px 0;
        }

        .pin-digit {
            width: 55px;
            height: 65px;
            background: rgba(255, 255, 255, 0.07);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: var(--dorado-arce);
            transition: 0.2s;
        }

        .pin-digit:focus {
            outline: none;
            border-color: var(--dorado-arce);
            background: rgba(255, 191, 0, 0.05);
            box-shadow: 0 0 15px rgba(255, 191, 0, 0.2);
        }

        .btn-arce {
            background: var(--dorado-arce);
            color: #000;
            font-weight: 800;
            padding: 16px;
            border-radius: 14px;
            border: none;
            width: 100%;
            font-size: 1rem;
            margin-top: 10px;
        }

        /* AJUSTES PARA MÓVIL (TECLADO) */
        @media (max-width: 576px) {
            .pin-modal {
                justify-content: flex-start; /* Subir el contenido para que el teclado no lo tape */
                padding-top: 60px;
            }
            .chofer-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .pin-digit {
                width: 50px;
                height: 60px;
            }
        }
    </style>
</head>
<body>

<div class="header-section">
    <h1 class="main-title">STOCK<span style="color:var(--dorado-arce)">ARCE</span></h1>
    <p style="color: #666; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; margin-top: 5px;">Sistema de Reparto</p>
</div>

<div class="container">
    <h2 class="text-center" style="font-size: 1.1rem; font-weight: 400; color: #aaa; margin-bottom: 25px;">Selecciona tu usuario</h2>
    
    <div class="chofer-grid">
        {% for chofer in choferes %}
        <div class="chofer-card" onclick="abrirPin('{{ chofer.id }}', '{{ chofer.nombre_completo }}')">
            <div class="chofer-avatar">
                <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
            <div class="chofer-nombre">{{ chofer.nombre_completo }}</div>
        </div>
        {% endfor %}
    </div>
</div>

<div class="pin-modal" id="pinModal">
    <div class="pin-box">
        <h3 id="pinTitulo" style="font-weight: 700; margin-bottom: 5px;">Hola, Nombre</h3>
        <p style="color: #888; font-size: 0.9rem;">Ingresa tu PIN de seguridad</p>

        <form method="POST" id="pinForm">
            {% csrf_token %}
            <input type="hidden" name="chofer_id" id="choferId">
            <input type="hidden" name="pin" id="pinHidden">

            <div class="pin-inputs-container">
                <input type="tel" maxlength="1" class="pin-digit" pattern="[0-9]*" inputmode="numeric">
                <input type="tel" maxlength="1" class="pin-digit" pattern="[0-9]*" inputmode="numeric">
                <input type="tel" maxlength="1" class="pin-digit" pattern="[0-9]*" inputmode="numeric">
                <input type="tel" maxlength="1" class="pin-digit" pattern="[0-9]*" inputmode="numeric">
            </div>

            <button type="submit" class="btn-arce">INGRESAR</button>
            <button type="button" class="btn btn-link text-muted mt-4" onclick="cerrarPin()" style="text-decoration: none; font-size: 0.8rem;">
                Cancelar y volver
            </button>
        </form>
    </div>
</div>

<script>
const pinDigits = document.querySelectorAll('.pin-digit');
const pinHidden = document.getElementById('pinHidden');
const modal = document.getElementById('pinModal');

function abrirPin(id, nombre) {
    modal.style.display = 'flex';
    document.getElementById('choferId').value = id;
    document.getElementById('pinTitulo').innerText = nombre;
    pinDigits[0].focus();
}

function cerrarPin() {
    modal.style.display = 'none';
    pinDigits.forEach(input => input.value = '');
    pinHidden.value = '';
}

// Lógica de los cuadritos de PIN
pinDigits.forEach((input, index) => {
    // Al escribir, saltar al siguiente
    input.addEventListener('input', (e) => {
        if (e.target.value.length > 0 && index < pinDigits.length - 1) {
            pinDigits[index + 1].focus();
        }
        actualizarPinOculto();
    });

    // Al borrar, volver al anterior
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
            pinDigits[index - 1].focus();
        }
    });
});

function actualizarPinOculto() {
    let pin = "";
    pinDigits.forEach(input => pin += input.value);
    pinHidden.value = pin;
}

// Cerrar si hace clic fuera del cuadro
window.onclick = (e) => { if (e.target == modal) cerrarPin(); }
</script>

</body>
</html>
