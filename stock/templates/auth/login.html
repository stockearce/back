{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    
    <style>
        /* Estilos generales y fondo */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;

            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Contenedor principal (La tarjeta de login) */
        .login-box {
            background: white;
            padding: 2.5rem;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 380px; /* Ancho máximo en PC */
            margin: 15px; /* Margen para pantallas pequeñas */
            box-sizing: border-box;
        }

        h2 {
            margin: 0 0 1.5rem;
            text-align: center;
            color: #333;
            font-weight: 700;
        }

        /* Estilo de los campos de entrada */
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box; /* Evita que el input se salga */
            font-size: 16px; /* Evita zoom automático en móviles */
            transition: border-color 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 2px rgba(118, 75, 162, 0.1);
        }

        /* Botón de entrar */
        button {
            width: 100%;
            padding: 12px;
            background-color: #764ba2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        button:hover {
            background-color: #5a3782;
        }

        button:active {
            transform: scale(0.98);
        }

        /* Mensajes de error de Django */
        .messages {
            margin-top: 15px;
            list-style: none;
            padding: 0;
        }

        .error-msg {
            background-color: #fee2e2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 6px;
            font-size: 0.85rem;
            text-align: center;
            border: 1px solid #fecaca;
        }

        /* Ajustes para pantallas muy pequeñas */
        @media (max-width: 400px) {
            .login-box {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Iniciar sesión</h2>

    <form method="post">
        {% csrf_token %}
        
        <label for="username">Usuario</label>
        <input type="text" id="username" name="username" placeholder="Tu usuario" required>

        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>

        <button type="submit">Entrar</button>
    </form>

    {% if messages %}
        <div class="messages">
            {% for message in messages %}
                <p class="error-msg">{{ message }}</p>
            {% endfor %}
        </div>
    {% endif %}
</div>

</body>
</html>
